task: detect                     # 任务类型：detect（目标检测）、segment（分割）、classify（分类）
mode: train                      # 运行模式：train（训练）、val（验证）、predict（预测）、export（导出）
data: data.yaml                  # 数据集配置文件路径（包含类别数、类别名、图像路径等）
epochs: 100                      # 训练轮数（完整遍历整个数据集的次数）
time: null                       # 训练时间限制（小时），优先级高于epochs，null表示不限制
patience: 10                     # 早停轮数：验证集性能连续多少轮无提升则停止训练
batch: 16                        # 批量大小：每批图像数量（受显存限制）
imgsz: 640                       # 输入图像尺寸（像素），所有图像会缩放到此尺寸
save: true                       # 是否保存训练好的模型权重（.pt文件）
save_period: -1                  # 每N轮保存一次模型（-1表示仅在训练结束时保存）
cache: false                     # 是否缓存图像到RAM/显存以加速训练（True/False/"ram"/"disk"）
device: null                     # 训练设备：null自动选择、cpu、0（第一块GPU）、cuda:0等
workers: 8                       # 数据加载线程数（Windows下通常设为0或1避免多进程问题）
project: garbage                 # 项目保存根目录（实验结果会保存在此目录下）
name: garbage_detection          # 本次实验的子目录名称（完整路径：project/name）
exist_ok: false                  # 是否允许覆盖已存在的同名实验目录（True则覆盖）
pretrained: false                # 是否使用预训练模型（True/False，或指定预训练权重路径）
optimizer: AdamW                 # 优化器：SGD、Adam、AdamW、RMSProp等
verbose: true                    # 是否打印详细日志（每轮训练的损失、指标等）
seed: 42                         # 随机种子，确保结果可重复
deterministic: true              # 是否使用确定性算法（保证完全可重复，但可能降低性能）
single_cls: false                # 是否作为单类别训练（所有类别视为同一类）
rect: false                      # 是否使用矩形训练（将图像按长宽比分批，减少填充）
cos_lr: true                     # 是否使用余弦退火学习率调度器
close_mosaic: 0                  # 在最后N轮关闭马赛克增强（0表示不关闭）
resume: false                    # 是否从上次中断的训练恢复（需指定checkpoint）
amp: true                        # 是否使用自动混合精度训练（加速、省显存）
fraction: 1.0                    # 数据集使用比例（1.0表示全量，0.5表示一半）
profile: false                   # 是否对模型速度进行逐层分析（用于性能调优）
freeze: null                     # 冻结前N层（如freeze=10），null表示不冻结
multi_scale: false               # 是否在训练期间随机多尺度输入（imgsz的±50%范围）
compile: false                   # 是否使用PyTorch 2.0的torch.compile加速（需PyTorch 2.0+）
overlap_mask: true               # 训练分割任务时是否允许mask重叠（仅segment任务）
mask_ratio: 4                    # 分割任务mask的下采样比例（默认4）
dropout: 0.0                     # Dropout率（仅在分类任务中生效）
val: true                        # 是否在每轮训练后执行验证
split: val                       # 用于验证的数据集分割（val/test）
save_json: false                 # 是否将验证结果保存为JSON文件
conf: null                       # 预测时置信度阈值（null则使用默认0.25）
iou: 0.7                         # NMS时的IoU阈值
max_det: 300                     # 每张图像最多保留的检测框数量
half: false                      # 是否使用FP16半精度推理（仅dnn=True时有效）
dnn: false                       # 是否使用OpenCV DNN进行推理（替代PyTorch）
plots: true                      # 是否生成训练曲线、混淆矩阵等可视化图表
source: null                     # 预测/验证时的图像源路径（文件、目录、URL等）
vid_stride: 1                    # 视频处理时的帧间隔（每隔多少帧处理一帧）
stream_buffer: false             # 是否缓冲视频流（用于实时流处理）
visualize: false                 # 是否可视化模型特征图（调试用）
augment: false                   # 预测时是否使用测试时增强（TTA）
agnostic_nms: false              # 是否在NMS时忽略类别（所有类别一起做NMS）
classes: null                    # 需要保留的类别索引列表（null表示全部）
retina_masks: false              # 是否输出高分辨率分割mask（仅segment任务）
embed: null                      # 需要输出特征的层名列表（用于特征提取）
show: false                      # 是否实时显示预测结果（仅显示模式）
save_frames: false               # 是否保存视频处理时的每一帧
save_txt: false                  # 是否将预测结果保存为YOLO格式的txt文件
save_conf: false                 # 保存txt时是否同时保存置信度分数
save_crop: false                 # 是否将检测到的目标裁剪并保存为图像
show_labels: true                # 预测可视化时是否显示标签文本
show_conf: true                  # 预测可视化时是否显示置信度分数
show_boxes: true                 # 预测可视化时是否显示边界框
line_width: null                 # 边界框线宽（像素），null表示自动
format: torchscript              # 模型导出格式（torchscript、onnx、openvino等）
keras: false                     # 是否导出为Keras格式（需要tensorflow）
optimize: false                  # 导出TorchScript时是否优化移动设备部署
int8: false                      # 是否导出为INT8量化的ONNX模型
dynamic: false                   # ONNX导出时是否使用动态batch/图像尺寸
simplify: true                   # 导出ONNX时是否使用onnx-simplifier简化模型
opset: null                      # ONNX导出时的opset版本（null表示自动）
workspace: null                  # TensorRT导出时的最大工作区大小（GB）
nms: false                       # 是否在ONNX/TensorRT导出时集成NMS层
lr0: 0.01                        # 初始学习率
lrf: 0.005                       # 最终学习率 = lr0 * lrf
momentum: 0.937                  # SGD优化器的动量，Adam优化器的beta1
weight_decay: 0.0005             # 权重衰减系数（L2正则化）
warmup_epochs: 0                 # 预热轮数（学习率从低到高线性增长）
warmup_momentum: 0.8             # 预热阶段的动量值
warmup_bias_lr: 0.1              # 预热阶段偏置参数的学习率
box: 5.5                         # 边界框损失的权重（IoU loss）
cls: 1.5                         # 分类损失的权重
dfl: 2.5                         # 分布焦点损失的权重（Distributed Focal Loss）
pose: 12.0                       # 姿态估计任务的损失权重（仅pose模型）
kobj: 1.0                        # 关键点目标性损失权重（仅pose模型）
nbs: 64                          # 名义批量大小（用于自动调整损失归一化）
hsv_h: 0.02                      # HSV色调增强的最大变化幅度（±范围，数据增强）
hsv_s: 0.3                       # HSV饱和度增强的最大变化幅度
hsv_v: 0.2                       # HSV明度增强的最大变化幅度
degrees: 0                       # 图像随机旋转的最大角度（度）
translate: 0.1                   # 图像随机平移的比例（相对于图像尺寸）
scale: 0.1                       # 图像随机缩放的比例（±范围）
shear: 0.0                       # 图像随机剪切的角度（度）
perspective: 0.0                 # 图像随机透视变换的程度（0表示禁用）
flipud: 0.0                      # 图像随机上下翻转的概率（适合不上下对称的数据），一般不启动这个
fliplr: 0.5                      # 图像随机左右翻转的概率
bgr: 0.0                         # 图像通道转换为BGR的概率（仅flipud/fliplr之后）
mosaic: 1.0                      # 马赛克增强的概率（将4张图拼成一张）
mixup: 0.0                       # MixUp增强的概率（两张图加权融合）
cutmix: 0.0                      # CutMix增强的概率（部分区域替换）
copy_paste: 0.2                  # Copy-Paste增强的概率（将目标复制到其他位置）
copy_paste_mode: flip            # Copy-Paste的模式（flip/flop/mixup等）
auto_augment: randaugment        # 自动数据增强策略（randaugment/autoaugment/mosaic）
erasing: 0.4                     # 随机擦除的概率（随机遮挡矩形区域）
cfg: null                        # 模型配置文件路径（null表示使用默认架构）
save_dir:                        # 保存目录（自动生成，一般无需指定）
